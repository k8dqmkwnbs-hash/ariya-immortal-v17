<!DOCTYPE html>
<html>
<head>
    <title>ARIYA IMMORTAL v17.5</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; }
        body, html { margin:0; padding:0; height:100%; overflow:hidden; font-family:'Kanit'; background:#000; color:#fff; }
        #bg { position:fixed; width:100%; height:100%; background-size:cover; background-position:center; z-index:-1; filter:brightness(0.4); transition:2s; }
        
        /* ปุ่ม GM ลับ (ซ่อนอยู่ที่มุมซ้ายบน) */
        #secret-gm { position:fixed; top:0; left:0; width:60px; height:60px; z-index:999; cursor:default; }
        #gm-menu { display:none; position:fixed; top:70px; left:20px; background:rgba(255,0,0,0.9); padding:15px; border-radius:15px; z-index:1000; border:2px solid #fff; }
        
        .container { height:100vh; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; }
        .glass-card { background:rgba(0,0,0,0.8); border:2px solid var(--gold); border-radius:25px; padding:20px; text-align:center; box-shadow:0 0 25px rgba(255,215,0,0.2); }
        
        .boss-warn { color:#ff4444; font-weight:bold; animation: blink 0.8s infinite; margin:10px 0; display:none; font-size:14px; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.2;} 100% {opacity:1;} }
        
        .btn-main { background:var(--gold); color:#000; border:none; padding:18px; border-radius:15px; width:100%; font-weight:bold; font-size:20px; cursor:pointer; margin-top:20px; }
        .nav-bar { display:flex; gap:10px; margin-top:auto; }
        .nav-item { flex:1; background:rgba(0,0,0,0.6); border:1px solid var(--gold); color:#fff; padding:12px; border-radius:10px; text-align:center; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="secret-gm" onclick="handleGM()"></div>
    
    <div id="gm-menu">
        <p style="margin:0 0 10px 0; font-weight:bold;">👑 GM PANEL</p>
        <button onclick="socket.emit('gm_power','gold')">เสกเงิน +1M</button><br><br>
        <button onclick="socket.emit('gm_power','lv')">เพิ่ม 10 เลเวล</button><br><br>
        <button onclick="document.getElementById('gm-menu').style.display='none'">ปิด</button>
    </div>

    <div class="container">
        <div class="glass-card">
            <div style="color:var(--gold); font-size:13px;">อายุขัย: <span id="age">12</span> ปี</div>
            <h1 id="rank" style="margin:10px 0; font-size:32px; color:var(--gold);">รวบรวมลมปราณ</h1>
            <div id="realm" style="font-size:12px; opacity:0.6; margin-bottom:15px;">มิติ: ...</div>
            
            <div id="boss-alert" class="boss-warn">⚠️ บอสประจำพื้นที่ปรากฏตัว! ⚠️</div>

            <div style="font-size:14px; margin-bottom:5px;">ความเสถียร: <span id="exp">0</span>%</div>
            <div style="width:100%; height:8px; background:#222; border-radius:4px; overflow:hidden;">
                <div id="bar" style="width:0%; height:100%; background:var(--gold); transition:0.4s;"></div>
            </div>

            <h2 style="font-size:30px; margin:20px 0; color:var(--gold);">💰 <span id="gold">0</span></h2>
            
            <button class="btn-main" onclick="socket.emit('toggle')">🧘 บำเพ็ญเพียร</button>
        </div>

        <div class="nav-bar">
            <div class="nav-item" style="border-width:2px; font-weight:bold;">🏯 สถานะ</div>
            <div class="nav-item" onclick="alert('หอสมบัติกำลังเปิด...')">🛒 ร้านค้า</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let clickCount = 0;
        let lastClick = 0;

        function handleGM() {
            const now = Date.now();
            if (now - lastClick > 2000) clickCount = 0;
            clickCount++;
            lastClick = now;
            if (clickCount >= 5) {
                document.getElementById('gm-menu').style.display = 'block';
                clickCount = 0;
            }
        }

        socket.on("tick", p => {
            document.getElementById('rank').innerText = p.rankName;
            document.getElementById('realm').innerText = "มิติ: " + p.realm;
            document.getElementById('gold').innerText = p.gold.toLocaleString();
            document.getElementById('exp').innerText = Math.floor(p.exp);
            document.getElementById('bar').style.width = p.exp + "%";
            document.getElementById('bg').style.backgroundImage = "url('" + p.bg + "')";
            document.getElementById('boss-alert').style.display = p.bossReady ? 'block' : 'none';
            localStorage.setItem('ariya_save_v17_5', JSON.stringify(p));
        });

        socket.emit('join', JSON.parse(localStorage.getItem('ariya_save_v17_5')));
    </script>
</body>
</html>
